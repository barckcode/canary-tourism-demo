name: Release

on:
  push:
    branches: [main]
    paths: [VERSION]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build and push backend image
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/barckcode/canary-tourism-demo/backend:${{ steps.version.outputs.version }}
            ghcr.io/barckcode/canary-tourism-demo/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/barckcode/canary-tourism-demo/frontend:${{ steps.version.outputs.version }}
            ghcr.io/barckcode/canary-tourism-demo/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631  # v2.2.2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true

      - name: Deploy to server
        if: steps.check_tag.outputs.exists == 'false'
        uses: appleboy/ssh-action@2ead5e36573714b28b4f2b032aa5f4b92e3efe59  # v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/canary/tenerife-tourism
            export VERSION=${{ steps.version.outputs.version }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Notify webhook
        if: always()
        run: |
          curl -s -X POST \
            "https://tourism-demo-ai.agentcrew.sh/webhook/trigger/${{ secrets.WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json"
